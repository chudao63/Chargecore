name: bss_checksheet
description: App hỗ trợ kỹ thuật viên chụp ảnh theo checksheet BSS (đổi tên + watermark + lưu bộ sưu tập).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2      # mở camera chụp ảnh / quay video
  image: ^4.2.0             # encode JPEG sau khi vẽ watermark
  geolocator: ^12.0.0       # lấy GPS cho watermark
  path_provider: ^2.1.4     # thư mục lưu trong app
  path: ^1.9.0
  gal: ^2.0.0               # lưu ảnh/video thẳng vào bộ sưu tập điện thoại
  ffmpeg_kit_flutter_min: ^6.0.3  # gắn watermark vào video
  http: ^1.2.0              # gọi dịch vụ tra địa danh từ toạ độ (thuần Dart, không có phần Android)
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/refs/
